<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Galeria Inspirada</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-left">
                <div class="login-flowers">
                    <div class="flower-large">&#10052;</div>
                    <div class="flower-medium">&#10047;</div>
                    <div class="flower-small">&#10048;</div>
                    <div class="flower-large">&#10052;</div>
                    <div class="flower-medium">&#10047;</div>
                </div>
            </div>
            <div class="login-right">
                <h1 class="login-title">Galeria Inspirada</h1>
                <p class="login-subtitle">Bem-vindo! Faça login para continuar</p>
                
                <form class="login-form" id="loginForm">
                    <div class="form-group">
                        <label for="username">Usuário:</label>
                        <input type="text" id="username" name="username" placeholder="Digite seu usuário" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Senha:</label>
                        <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
                    </div>
                    
                    <div id="loginError" class="login-error"></div>
                    
                    <button type="submit" class="login-btn">Entrar</button>
                </form>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
