<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImgBiel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 350px;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 12px;
            color: #999;
            font-weight: 500;
        }

        .buttons {
            display: flex;
            gap: 12px;
            flex-direction: column;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #efefef;
            border-color: #d0d0d0;
        }

        .status {
            margin-top: 16px;
            padding: 12px;
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            border-radius: 8px;
            font-size: 12px;
            color: #555;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #e8f5e9;
            border-left-color: #4caf50;
            color: #2e7d32;
        }

        .status.error {
            background: #ffebee;
            border-left-color: #f44336;
            color: #c62828;
        }

        .info {
            margin-top: 16px;
            padding: 12px;
            background: #fafafa;
            border-radius: 8px;
            font-size: 12px;
            color: #666;
            line-height: 1.5;
        }

        .feature-list {
            margin-top: 16px;
            font-size: 13px;
            color: #666;
        }

        .feature-list li {
            margin-left: 20px;
            margin-bottom: 6px;
        }

        .loader {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🖼️</div>
            <div class="title">ImgBiel</div>
            <div class="subtitle">Galeria Inteligente</div>
        </div>

        <div class="buttons">
            <button class="btn-primary" id="openGallery">
                📱 Abrir Galeria
            </button>
            <button class="btn-secondary" id="startServer">
                🚀 Iniciar Servidor
            </button>
        </div>

        <div class="status" id="status">
            <span id="statusText"></span>
        </div>

        <div class="info">
            <strong>📋 Funcionalidades:</strong>
            <ul class="feature-list">
                <li>✨ 3D Flip interativo</li>
                <li>📁 Sincronização de pasta</li>
                <li>📝 Editor de texto</li>
                <li>⏱️ Auto-slideshow</li>
            </ul>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
